<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Game Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000; /* Black background */
            color: #fff; /* White text */
        }

        header {
            background-color: #222;
            color: #00ff00; /* Green text */
            padding: 10px 0;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 40px #00ff00;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 40px #00ff00;
        }

        nav a {
            color: #00ff00; /* Green text */
            padding: 15px;
            text-decoration: none;
            text-align: center;
        }

        nav a:hover {
            background-color: #00ff00;
            color: #000; /* Black text on hover */
        }

        main {
            padding: 20px;
        }

        h2, h3 {
            color: #00ff00; /* Green text */
        }

        .game {
            border: 1px solid #444;
            padding: 15px;
            margin: 15px 0;
            background-color: #111; /* Dark background */
            border-radius: 10px;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 40px #00ff00;
        }

        .game p {
            color: #bbb; /* Lighter shade of text */
        }

        footer {
            background-color: #222;
            color: #00ff00; /* Green text */
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 40px #00ff00;
        }

        button {
            background-color: #00ff00;
            color: #000; /* Black text */
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00cc00;
        }
    </style>
</head>
<body>
    <header>
        <h1>Online Game Website</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Leaderboard</a>
        <a href="#">Login</a>
    </nav>
    <main>
        <h2>Featured Games</h2>
        <div class="game">
            <h3>Game Title</h3>
            <p>Description of the game.</p>
            <button onclick="startGame()">Play Now</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Online Game Website. All rights reserved.</p>
    </footer>
    <script>
        function startGame() {
            alert("Starting the game...");
            // Add your game logic here
        }
    </script>
</body>
</html>
