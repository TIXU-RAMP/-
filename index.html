<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Game Website</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Dark gray background */
            color: #f0f0f0; /* Light gray text */
        }

        header {
            background-color: #333;
            color: #4caf50; /* Green text */
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #4caf50;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
            padding: 10px 0;
        }

        nav a {
            color: #4caf50; /* Green text */
            padding: 10px 20px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        nav a:hover {
            background-color: #4caf50;
            color: #1a1a1a; /* Dark gray text on hover */
        }

        main {
            padding: 20px;
        }

        h2, h3 {
            color: #4caf50; /* Green text */
        }

        .game {
            border: 1px solid #555;
            padding: 20px;
            margin: 20px 0;
            background-color: #222; /* Dark background */
            border-radius: 10px;
            transition: box-shadow 0.3s ease;
        }

        .game:hover {
            box-shadow: 0 0 15px #4caf50;
        }

        .game p {
            color: #ccc; /* Lighter shade of text */
        }

        footer {
            background-color: #333;
            color: #4caf50; /* Green text */
            text-align: center;
            padding: 15px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 2px solid #4caf50;
        }

        button {
            background-color: #4caf50;
            color: #1a1a1a; /* Dark gray text */
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #388e3c;
        }
    </style>
</head>
<body>
    <header>
        <h1>Online Game Website</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Leaderboard</a>
        <a href="#">Login</a>
    </nav>
    <main>
        <h2>Featured Games</h2>
        <div class="game">
            <h3>Game Title</h3>
            <p>Description of the game.</p>
            <button onclick="startGame()">Play Now</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Online Game Website. All rights reserved.</p>
    </footer>
    <script>
        function startGame() {
            alert("Starting the game...");
            // Add your game logic here
        }
    </script>
</body>
</html>
