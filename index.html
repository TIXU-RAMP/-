<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Game Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
        }

        nav a {
            color: white;
            padding: 15px;
            text-decoration: none;
            text-align: center;
        }

        nav a:hover {
            background-color: #555;
        }

        main {
            padding: 20px;
        }

        .game {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 15px 0;
            background-color: white;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Online Game Website</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Leaderboard</a>
        <a href="#">Login</a>
    </nav>
    <main>
        <h2>Featured Games</h2>
        <div class="game">
            <h3>Game Title</h3>
            <p>Description of the game.</p>
            <button onclick="startGame()">Play Now</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Online Game Website. All rights reserved.</p>
    </footer>
    <script>
        function startGame() {
            alert("Starting the game...");
            // Add your game logic here
        }
    </script>
</body>
</html>
