<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
        font-family: 'Roboto', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #1a1a1a; /* Dark gray background */
        color: #f0f0f0; /* Light gray text */
    }

    header {
        background-color: #333;
        color: #4caf50; /* Green text */
        padding: 20px 0;
        text-align: center;
        border-bottom: 2px solid #4caf50;
    }

    nav {
        display: flex;
        justify-content: center;
        background-color: #444;
        padding: 10px 0;
    }

    nav a {
        color: #4caf50; /* Green text */
        padding: 10px 20px;
        text-decoration: none;
        transition: background-color 0.3s ease;
    }

    nav a:hover {
        background-color: #4caf50;
        color: #1a1a1a; /* Dark gray text on hover */
    }

    main {
        padding: 20px;
        text-align: center;
    }

    h2, h3 {
        color: #4caf50; /* Green text */
    }

    .error {
        border: 1px solid #555;
        padding: 20px;
        margin: 20px 0;
        background-color: #222; /* Dark background */
        border-radius: 10px;
        transition: box-shadow 0.3s ease;
    }

    .error:hover {
        box-shadow: 0 0 15px #4caf50;
    }

    .error p {
        color: #ccc; /* Lighter shade of text */
    }

    footer {
        background-color: #333;
        color: #4caf50; /* Green text */
        text-align: center;
        padding: 15px 0;
        position: fixed;
        bottom: 0;
        width: 100%;
        border-top: 2px solid #4caf50;
    }

    img {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
    }
  </style>
</head>
<body>
    <header>
        <h1>404 Not Found</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Leaderboard</a>
        <a href="#">Login</a>
    </nav>
    <main>
        <div class="error">
            <img src="B/Water Splash (1).png" alt="Error Image">
            <h2>404</h2>
            <p>Page Not Found</p>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Online Game Website. All rights reserved.</p>
    </footer>
</body>
</html>
