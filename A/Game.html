<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon: #4caf50;
            --glow: rgba(76, 175, 80, 0.3);
            --dark: #1a1a1a;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: #f0f0f0;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: #444;
            padding: 10px 0;
        }

        nav a {
            color: var(--neon);
            padding: 10px 20px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        nav a:hover {
            background-color: var(--neon);
            color: var(--dark);
        }

        main {
            padding: 20px;
        }

        h2, h3 {
            color: var(--neon);
        }

        .game, .link-card {
            border: 1px solid #555;
            padding: 20px;
            margin: 20px 0;
            background-color: #222;
            border-radius: 10px;
            transition: box-shadow 0.3s ease;
        }

        .game:hover, .link-card:hover {
            box-shadow: 0 0 15px var(--neon);
        }

        .game p, .link-card p {
            color: #ccc;
        }

        footer {
            background-color: #333;
            color: var(--neon);
            text-align: center;
            padding: 15px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            border-top: 2px solid var(--neon);
        }

        button {
            background-color: var(--neon);
            color: var(--dark);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #388e3c;
        }

        .link-card a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .link-card a:hover {
            background: var(--glow);
            transform: translateX(5px);
        }

        .link-card a:active {
            color: var(--neon);
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Leaderboard</a>
        <a href="#">Login</a>
    </nav>
    <main>
        <h2>Featured Games</h2>
        <div class="link-card"><a href="tixu-ramp.github.io/-/C/1.html"><h3>Server 1</h3><p>Description of the game 1.</p></div></a></div>
        <div class="link-card"><a href="https://examplegame2.com"><i class="fa-solid fa-gamepad"></i><div><h3>Game Title 2</h3><p>Description of the game 2.</p></div></a></div>
        <div class="link-card"><a href="https://examplegame3.com"><i class="fa-solid fa-gamepad"></i><div><h3>Game Title 3</h3><p>Description of the game 3.</p></div></a></div>
        <h2>Useful Links</h2>
        <div class="link-card"><a href="https://example.com" class="link"><i class="fa-solid fa-cloud-arrow-up"></i> Link 1</a></div>
        <div class="link-card"><a href="https://example2.com" class="link"><i class="fa-solid fa-cloud-arrow-up"></i> Link 2</a></div>
        <div class="link-card"><a href="https://example3.com" class="link"><i class="fa-solid fa-cloud-arrow-up"></i> Link 3</a></div>
    </main>
    <footer>
        <p>&copy; 2025 Online Game Website. All rights reserved.</p>
    </footer>
    <script>
        function startGame() {
            alert("Starting the game...");
            // Add your game logic here
        }
    </script>
</body>
</html>
